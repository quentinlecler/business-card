<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph -->
  <meta property="og:title" content="Quentin Lecler - Full-Stack Developer | Banking & Healthcare">
  <meta property="og:description" content="Full-Stack Developer based in Liège, Belgium. Building robust applications for banking and healthcare sectors with Laravel, .NET, React, and Vue.js.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lecler.dev">
  <meta property="og:image" content="https://lecler.dev/og.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Quentin Lecler - Full-Stack Developer | Banking & Healthcare">
  <meta name="twitter:description" content="Full-Stack Developer based in Liège, Belgium. Building robust applications for banking and healthcare sectors with Laravel, .NET, React, and Vue.js.">
  <meta name="twitter:image" content="https://lecler.dev/og.png">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>Q</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #fafafa;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #1a1a1a;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      text-align: center;
      max-width: 440px;
      animation: fadeIn 0.5s ease-out;
    }

    .name {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }

    .role {
      font-size: 1.1rem;
      color: #444;
      margin-bottom: 0.5rem;
    }

    .sectors {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 0.3rem;
    }

    .location {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 1.5rem;
    }

    .current {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1.8rem;
    }

    .current a {
      color: #1a1a1a;
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: border-color 0.2s;
    }

    .current a:hover {
      border-color: #1a1a1a;
    }

    .stack {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .stack span {
      font-size: 0.75rem;
      color: #666;
      background: #eee;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      transition: all 0.2s ease;
      cursor: default;
    }

    .stack span:hover {
      background: #1a1a1a;
      color: #fff;
    }

    .links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .links a {
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .links a.primary {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #1a1a1a;
    }

    .links a.primary:hover {
      background: #333;
    }

    .links a.secondary {
      color: #1a1a1a;
      border: 1px solid #ddd;
    }

    .links a.secondary:hover {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    @media (max-width: 480px) {
      .name { font-size: 1.6rem; }
      .role { font-size: 1rem; }
      .links { flex-direction: column; gap: 0.6rem; }
      .links a { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="name">Quentin Lecler</h1>
    <p class="role">Full-Stack Developer</p>
    <p class="sectors">Banking & Healthcare Solutions</p>
    <p class="location">Liège, Belgium</p>

    <p class="current">Currently building <a href="https://doctipro.lu" target="_blank" rel="noopener">Doctipro</a></p>

    <div class="stack">
      <span>Laravel</span>
      <span>.NET</span>
      <span>React</span>
      <span>Vue.js</span>
      <span>TypeScript</span>
    </div>

    <nav class="links">
      <a href="mailto:hello@lecler.dev" class="primary">Email</a>
      <a href="https://github.com/quentinlecler" target="_blank" rel="noopener" class="secondary">GitHub</a>
      <a href="https://linkedin.com/in/qlecler" target="_blank" rel="noopener" class="secondary">LinkedIn</a>
    </nav>
  </main>
</body>
</html>
